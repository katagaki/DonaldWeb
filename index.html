<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Diet Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=SF+Pro+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f2f7;--bg-dark:#000;
  --glass:rgba(255,255,255,0.45);--glass-border:rgba(255,255,255,0.65);
  --glass-dark:rgba(120,120,128,0.24);--glass-border-dark:rgba(255,255,255,0.18);
  --glass-solid:rgba(255,255,255,0.78);
  --text:#1c1c1e;--text2:#3a3a3c;--text3:#8e8e93;
  --blue:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--yellow:#ffcc00;
  --teal:#30b0c7;--indigo:#5856d6;
  --pill-h:52px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Hiragino Sans',sans-serif;
  background:var(--bg);color:var(--text);overflow:hidden;touch-action:manipulation;
}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

/* Liquid Glass material */
.glass{
  background:var(--glass);
  backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
  border:0.5px solid var(--glass-border);
  border-radius:22px;
  box-shadow:
    0 0.5px 0 0 rgba(255,255,255,0.6) inset,
    0 -0.5px 0 0 rgba(0,0,0,0.05) inset,
    0 8px 32px rgba(0,0,0,0.08),
    0 2px 8px rgba(0,0,0,0.04);
}
.glass-pill{
  background:var(--glass);
  backdrop-filter:blur(30px) saturate(150%);-webkit-backdrop-filter:blur(30px) saturate(150%);
  border:0.5px solid var(--glass-border);
  border-radius:26px;
  box-shadow:0 0.5px 0 rgba(255,255,255,0.5) inset,0 4px 16px rgba(0,0,0,0.06);
}
.glass-solid{
  background:var(--glass-solid);
  backdrop-filter:blur(50px) saturate(200%);-webkit-backdrop-filter:blur(50px) saturate(200%);
  border:0.5px solid rgba(255,255,255,0.8);
  border-radius:22px;
  box-shadow:0 0.5px 0 rgba(255,255,255,0.7) inset,0 8px 32px rgba(0,0,0,0.1);
}

/* Background gradient mesh */
.bg-mesh{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 20%,rgba(48,176,199,0.15) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 30%,rgba(255,149,0,0.12) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 80%,rgba(88,86,214,0.1) 0%,transparent 50%),
    var(--bg);
}

/* Header */
.header{
  position:relative;z-index:10;
  padding:max(env(safe-area-inset-top),12px) 20px 12px;
  display:flex;justify-content:space-between;align-items:center;
}
.header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}
.header p{font-size:11px;color:var(--text3);letter-spacing:0.3px;margin-top:2px}
.btn-gen{
  padding:10px 18px;border-radius:22px;border:none;
  background:linear-gradient(135deg,var(--blue),var(--indigo));
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;
  font-family:inherit;
  box-shadow:0 4px 16px rgba(0,122,255,0.3);
  transition:transform .15s,box-shadow .15s;
}
.btn-gen:active{transform:scale(0.95);box-shadow:0 2px 8px rgba(0,122,255,0.2)}

/* Day tabs */
.day-tabs{
  display:flex;gap:4px;padding:8px 16px 4px;position:relative;z-index:5;
}
.day-tab{
  flex:1;padding:10px 0 8px;border-radius:16px;border:none;
  background:transparent;color:var(--text3);
  font-size:16px;font-weight:500;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  font-family:inherit;transition:all .2s;
}
.day-tab.active{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--glass-border);color:var(--text);font-weight:700;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.day-dot{width:6px;height:6px;border-radius:3px}

/* Content scroll */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 16px 90px;position:relative;z-index:5}

/* Macro card */
.macro-card{padding:14px 16px;margin-bottom:10px}
.macro-label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:0.5px;margin-bottom:10px}
.macro-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.macro-row span:first-child{font-size:11px;color:var(--text3);width:26px;font-weight:600}
.macro-bar{flex:1;height:10px;background:rgba(0,0,0,0.06);border-radius:5px;overflow:hidden;box-shadow:inset 0 0.5px 1px rgba(0,0,0,0.08)}
.macro-fill{height:100%;border-radius:5px;transition:width .4s cubic-bezier(.4,0,.2,1);box-shadow:0 0.5px 0 rgba(255,255,255,0.3) inset}
.macro-val{font-size:10px;color:var(--text3);min-width:58px;text-align:right;font-weight:500;font-variant-numeric:tabular-nums}
.macro-val.over{color:var(--red)}

/* Meal slot */
.meal-slot{padding:10px 14px;margin-bottom:8px}
.meal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.meal-title{font-size:12px;color:var(--text3);font-weight:700;letter-spacing:1px}
.btn-add{
  padding:7px 16px;border-radius:18px;border:none;
  background:rgba(0,122,255,0.12);color:var(--blue);
  font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:background .15s;min-height:34px;
}
.btn-add:active{background:rgba(0,122,255,0.2)}
.meal-empty{color:var(--text3);font-size:12px;text-align:center;padding:12px 0;opacity:0.5}
.meal-item{display:flex;align-items:center;gap:10px;padding:9px 0}
.meal-item+.meal-item{border-top:0.5px solid rgba(0,0,0,0.06)}
.src-dot{width:8px;height:8px;border-radius:4px;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-macros{font-size:10px;color:var(--text3);margin-top:2px;font-variant-numeric:tabular-nums}
.btn-rm{
  width:28px;height:28px;border-radius:14px;border:none;
  background:rgba(255,59,48,0.1);color:var(--red);
  font-size:16px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s;
}
.btn-rm:active{background:rgba(255,59,48,0.2)}

/* Bottom tab bar - Liquid Glass floating pill */
.tab-bar{
  position:absolute;bottom:calc(12px + var(--safe-b));left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:0;
  padding:4px;min-width:200px;
}
.tab-btn{
  flex:1;padding:10px 20px;border-radius:22px;border:none;
  background:transparent;color:var(--text3);
  font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;
  transition:all .25s;
}
.tab-btn.active{background:rgba(0,122,255,0.15);color:var(--blue);font-weight:700}

/* Summary view */
.summary-card{padding:14px 16px;margin-bottom:10px}
.breakdown-list{overflow:hidden}
.breakdown-row{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  border:none;background:transparent;width:100%;text-align:left;
  cursor:pointer;font-family:inherit;
}
.breakdown-row+.breakdown-row{border-top:0.5px solid rgba(0,0,0,0.06)}
.breakdown-day{font-size:15px;font-weight:700;color:var(--text);width:18px}
.breakdown-bar{flex:1;height:6px;background:rgba(0,0,0,0.06);border-radius:3px;overflow:hidden}
.breakdown-fill{height:100%;border-radius:3px;transition:width .3s}
.breakdown-val{font-size:10px;color:var(--text3);min-width:80px;text-align:right;font-weight:500;font-variant-numeric:tabular-nums}

.source-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.source-row .src-dot{width:8px;height:8px}
.source-label{font-size:13px;color:var(--text2);flex:1;font-weight:500}
.source-count{font-size:15px;font-weight:700;color:var(--text)}
.source-unit{font-size:10px;color:var(--text3)}

.tips-card{
  background:linear-gradient(135deg,rgba(255,204,0,0.12),rgba(255,149,0,0.08));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:0.5px solid rgba(255,204,0,0.3);
  border-radius:22px;padding:14px 16px;margin-top:10px;
}
.tips-title{font-size:10px;color:var(--orange);font-weight:700;letter-spacing:0.5px;margin-bottom:6px}
.tips-body{font-size:12px;color:var(--text2);line-height:1.8}

/* Overlays */
.overlay{position:fixed;inset:0;z-index:100;display:none}
.overlay.open{display:flex}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}

/* Bottom sheet */
.sheet{
  position:absolute;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(50px) saturate(200%);-webkit-backdrop-filter:blur(50px) saturate(200%);
  border-radius:28px 28px 0 0;border:0.5px solid rgba(255,255,255,0.8);border-bottom:none;
  padding:16px 20px calc(20px + var(--safe-b));
  box-shadow:0 -8px 40px rgba(0,0,0,0.15);
  animation:sheetUp .3s cubic-bezier(.32,.72,0,1);
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:5px;background:rgba(0,0,0,0.12);border-radius:3px;margin:0 auto 16px}
.sheet h3{font-size:20px;font-weight:700;margin-bottom:16px}
.freq-row{display:flex;justify-content:space-between;margin-bottom:8px}
.freq-label{font-size:14px;color:var(--text2)}
.freq-val{font-size:14px;color:var(--text);font-weight:700}
.sheet input[type=range]{width:100%;accent-color:var(--red);margin-bottom:4px}
.freq-hints{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:16px}
.sheet-targets{
  display:flex;justify-content:space-between;font-size:11px;color:var(--text3);
  padding:10px 14px;background:rgba(0,0,0,0.03);border-radius:14px;margin-bottom:16px;
}
.sheet-btns{display:flex;gap:10px}
.btn-clear{
  flex:1;padding:14px;border-radius:16px;border:none;
  background:rgba(0,0,0,0.04);color:var(--text2);
  font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;min-height:50px;
}
.btn-clear:active{background:rgba(0,0,0,0.08)}
.btn-generate{
  flex:2;padding:14px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--blue),var(--indigo));color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;min-height:50px;
  box-shadow:0 4px 16px rgba(0,122,255,0.3);
}
.btn-generate:active{transform:scale(0.98)}

/* Picker */
.picker{
  position:absolute;inset:0;max-width:430px;margin:0 auto;
  background:var(--bg);display:flex;flex-direction:column;
  animation:fadeIn .2s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.picker-header{
  padding:max(env(safe-area-inset-top),8px) 12px 8px;
  background:rgba(255,255,255,0.8);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-bottom:0.5px solid rgba(0,0,0,0.08);
}
.picker-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.btn-back{
  background:none;border:none;color:var(--blue);font-size:16px;font-weight:500;
  cursor:pointer;padding:8px 12px;font-family:inherit;min-width:44px;min-height:44px;
  display:flex;align-items:center;
}
.picker-search{
  flex:1;padding:10px 14px;border-radius:14px;border:none;
  background:rgba(0,0,0,0.04);font-size:15px;color:var(--text);
  outline:none;font-family:inherit;
}
.picker-filters{display:flex;gap:6px;padding-bottom:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-btn{
  padding:7px 16px;border-radius:20px;border:none;white-space:nowrap;
  background:rgba(0,0,0,0.04);color:var(--text3);
  font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;min-height:34px;
  transition:all .15s;
}
.filter-btn.active{background:rgba(0,122,255,0.12);color:var(--blue);font-weight:700}
.picker-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px 20px}
.picker-count{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:0.5px;margin-bottom:6px}
.picker-items{border-radius:22px;overflow:hidden}
.picker-item{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  border:none;background:var(--glass-solid);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  width:100%;text-align:left;cursor:pointer;font-family:inherit;min-height:54px;
}
.picker-item+.picker-item{border-top:0.5px solid rgba(0,0,0,0.06)}
.picker-item:active{background:rgba(0,122,255,0.06)}
.pi-name{font-size:14px;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi-macros{font-size:10px;color:var(--text3);margin-top:2px}
.pi-fat{font-size:12px;font-weight:700;flex-shrink:0;font-variant-numeric:tabular-nums}
.fat-low{color:var(--green)}.fat-mid{color:var(--orange)}.fat-high{color:var(--red)}
</style>
</head>

const DAYS=["月","火","水","木","金","土","日"],MEALS=["朝食","昼食","夕食"],MKEYS=["breakfast","lunch","dinner"];
const FAT_T=40,CAL_T=1800,PRO_T=60,FIB_T=18;
const allFlat=[];
Object.entries(DB).forEach(([k,s])=>s.items.forEach(it=>allFlat.push({...it,src:k,srcColor:s.color,srcLabel:s.label})));

function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b}

function generateWeek(macPct){
  const plan=DAYS.map(()=>MEALS.map(()=>[]));
  const macDays=macPct>0?shuffle([0,1,2,3,4,5,6]).slice(0,Math.max(1,Math.round(7*macPct/100))):[];
  for(let d=0;d<7;d++){
    const used=new Set();let dayFat=0;const isMac=macDays.includes(d);
    for(let m=0;m<3;m++){
      const slot=MKEYS[m],fatLeft=FAT_T-dayFat;let items=[];
      if(isMac&&m===1){
        const pool=DB.mcdonalds.items.filter(i=>(i.meal==="any"||i.meal.includes("lunch"))&&i.f<=15);
        const b=pool.filter(i=>i.cat==="meal"),s=pool.filter(i=>["veggie","dessert"].includes(i.cat));
        const burger=b.length?pick(b):null,side=s.length?pick(s.filter(i=>burger?i.id!==burger.id:true)):null;
        items=[burger,side].filter(Boolean);
      }else{
        const pool=allFlat.filter(i=>i.src!=="mcdonalds"&&(i.meal==="any"||i.meal.includes(slot))&&!used.has(i.id));
        if(slot==="breakfast"){
          const mains=pool.filter(i=>["meal","protein"].includes(i.cat)&&i.f<=12);
          const sides=pool.filter(i=>["carb","veggie","soup"].includes(i.cat)&&i.f<=5);
          const main=mains.length?pick(mains):null,sd=sides.length?pick(sides.filter(i=>main?i.id!==main.id:true)):null;
          items=[main,sd].filter(Boolean);
        }else{
          const fMax=fatLeft>25?18:12;
          const mp=pool.filter(i=>i.cat==="meal"&&i.f<=fMax);
          const main=mp.length?pick(mp):(pool.filter(i=>i.cat==="meal").length?pick(pool.filter(i=>i.cat==="meal")):null);
          if(main){const rf=fatLeft-main.f;const extras=pool.filter(i=>i.id!==main.id&&["veggie","soup","carb","protein"].includes(i.cat)&&i.f<=Math.min(rf*.4,5));const hiF=extras.filter(i=>i.fi>=2);const ex=hiF.length?pick(hiF):extras.length?pick(extras):null;items=[main,ex].filter(Boolean);}
        }
      }
      items.forEach(i=>used.add(i.id));
      plan[d][m]=items.map(i=>({id:i.id,name:i.name,cal:i.cal,p:i.p,f:i.f,c:i.c,fi:i.fi}));
      dayFat+=items.reduce((s,i)=>s+i.f,0);
    }
  }
  return plan;
}

// === STATE ===
let plan=DAYS.map(()=>MEALS.map(()=>[])),activeDay=0,view="plan",macFreq=15;

function totals(d){let cal=0,p=0,f=0,c=0,fi=0;plan[d].forEach(m=>m.forEach(i=>{cal+=i.cal;p+=i.p;f+=i.f;c+=i.c;fi+=(i.fi||0)}));return{cal,p,f,c,fi}}
function srcCol(id){for(const[,s]of Object.entries(DB)){if(s.items.some(i=>i.id===id))return s.color}return"#8e8e93"}
function fatClass(f){return f<=10?"fat-low":f<=15?"fat-mid":"fat-high"}

function macroBarHTML(label,val,max,unit,color){
  const pct=Math.min(val/max*100,100),over=val>max;
  return`<div class="macro-row"><span>${label}</span><div class="macro-bar"><div class="macro-fill" style="width:${pct}%;background:${over?'var(--red)':color}"></div></div><span class="macro-val${over?' over':''}">${val.toFixed(0)}/${max}${unit}</span></div>`;
}

// === RENDER ===
function render(){
  const dt=totals(activeDay);
  let html='';

  // Header
  html+=`<div class="header"><div><h1>Diet Planner</h1><p>nosh + セブン + マック -- 低脂質</p></div><button class="btn-gen" onclick="openGen()">自動生成</button></div>`;

  if(view==="plan"){
    // Day tabs
    html+=`<div class="day-tabs">`;
    DAYS.forEach((d,i)=>{const t=totals(i),a=activeDay===i,has=t.cal>0,ok=t.f<=FAT_T;
      html+=`<button class="day-tab${a?' active':''}" onclick="setDay(${i})">${d}${has?`<div class="day-dot" style="background:${ok?'var(--green)':'var(--red)'}"></div>`:''}</button>`;
    });
    html+=`</div>`;

    // Macro card
    html+=`<div class="content" id="scroll"><div class="glass macro-card"><div class="macro-label">${DAYS[activeDay]}曜日</div>`;
    html+=macroBarHTML("Cal",dt.cal,CAL_T,"","var(--blue)");
    html+=macroBarHTML("Fat",dt.f,FAT_T,"g","var(--orange)");
    html+=macroBarHTML("Pro",dt.p,PRO_T,"g","var(--green)");
    html+=macroBarHTML("Fib",dt.fi,FIB_T,"g","var(--teal)");
    html+=`</div>`;

    // Meal slots
    MEALS.forEach((meal,mi)=>{
      html+=`<div class="glass meal-slot"><div class="meal-header"><span class="meal-title">${meal}</span><button class="btn-add" onclick="openPicker(${activeDay},${mi})">+ 追加</button></div>`;
      if(!plan[activeDay][mi].length) html+=`<div class="meal-empty" onclick="openPicker(${activeDay},${mi})">タップして追加</div>`;
      plan[activeDay][mi].forEach((item,idx)=>{
        html+=`<div class="meal-item"><div class="src-dot" style="background:${srcCol(item.id)}"></div><div class="item-info"><div class="item-name">${item.name}</div><div class="item-macros">${item.cal}kcal P${item.p} F${item.f} C${item.c} Fib${item.fi||0}</div></div><button class="btn-rm" onclick="rmItem(${activeDay},${mi},${idx})">x</button></div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  }

  if(view==="summary"){
    html+=`<div class="content" id="scroll">`;
    // Week avg
    let cal=0,p=0,f=0,c=0,fi=0,n=0;plan.forEach((_,i)=>{const t=totals(i);if(t.cal>0){cal+=t.cal;p+=t.p;f+=t.f;c+=t.c;fi+=t.fi;n++}});n=n||1;
    html+=`<div class="glass summary-card"><div class="macro-label">週間平均 (${n}日)</div>`;
    html+=macroBarHTML("Cal",cal/n,CAL_T,"","var(--blue)");
    html+=macroBarHTML("Fat",f/n,FAT_T,"g","var(--orange)");
    html+=macroBarHTML("Pro",p/n,PRO_T,"g","var(--green)");
    html+=macroBarHTML("Fib",fi/n,FIB_T,"g","var(--teal)");
    html+=`</div>`;

    // Breakdown
    html+=`<div class="macro-label" style="padding:0 4px;margin-bottom:6px">日別</div><div class="glass-solid breakdown-list">`;
    DAYS.forEach((d,i)=>{const t=totals(i),pct=Math.min(t.f/FAT_T*100,100),over=t.f>FAT_T;
      html+=`<button class="breakdown-row" onclick="setDay(${i});setView('plan')"><span class="breakdown-day">${d}</span><div class="breakdown-bar"><div class="breakdown-fill" style="width:${pct}%;background:${over?'var(--red)':'var(--orange)'}"></div></div><span class="breakdown-val" style="color:${over?'var(--red)':'var(--text3)'}">${t.cal>0?Math.round(t.cal)+'kcal F'+t.f.toFixed(0)+'g':'--'}</span></button>`;
    });
    html+=`</div>`;

    // Sources
    html+=`<div class="glass summary-card" style="margin-top:10px"><div class="macro-label">ソース内訳</div>`;
    Object.entries(DB).forEach(([k,src])=>{let cnt=0;plan.forEach(d=>d.forEach(m=>m.forEach(i=>{if(src.items.some(si=>si.id===i.id))cnt++})));
      html+=`<div class="source-row"><div class="src-dot" style="background:${src.color}"></div><span class="source-label">${src.label}</span><span class="source-count">${cnt}</span><span class="source-unit">品</span></div>`;
    });
    html+=`</div>`;

    // Tips
    html+=`<div class="tips-card"><div class="tips-title">TIPS</div><div class="tips-body">- noshは白身魚系がF6-9gで最優秀<br>- こんにゃく麺/ミネストローネで食物繊維UP<br>- セブンはもち麦おにぎり+ひじき煮が鉄板<br>- マックはハンバーガー単品(F9.4g)一択<br>- 脂質40g以下 / 食物繊維18g以上が目標</div></div>`;
    html+=`</div>`;
  }

  // Tab bar
  html+=`<div class="glass-pill tab-bar"><button class="tab-btn${view==='plan'?' active':''}" onclick="setView('plan')">プラン</button><button class="tab-btn${view==='summary'?' active':''}" onclick="setView('summary')">サマリー</button></div>`;

  document.getElementById('app').innerHTML=html;
}

// === ACTIONS ===
window.setDay=function(i){activeDay=i;render()};
window.setView=function(v){view=v;render()};
window.rmItem=function(d,m,idx){plan[d][m].splice(idx,1);render()};

window.openGen=function(){
  let o=document.getElementById('genOverlay');
  if(!o){o=document.createElement('div');o.id='genOverlay';o.className='overlay';document.body.appendChild(o)}
  o.className='overlay open';
  o.innerHTML=`<div class="overlay-bg" onclick="closeGen()"></div><div class="sheet"><div class="sheet-handle"></div><h3>自動プラン生成</h3><div class="freq-row"><span class="freq-label">マック頻度</span><span class="freq-val" id="freqVal">${macFreq===0?'なし':macFreq<=15?'週1回':macFreq<=30?'週2回':'週3回'}</span></div><input type="range" min="0" max="45" value="${macFreq}" oninput="macFreq=+this.value;document.getElementById('freqVal').textContent=macFreq===0?'なし':macFreq<=15?'週1回':macFreq<=30?'週2回':'週3回'"><div class="freq-hints"><span>なし</span><span>週3回</span></div><div class="sheet-targets"><span>Fat ${FAT_T}g</span><span>Fib ${FIB_T}g</span><span>${CAL_T}kcal</span></div><div class="sheet-btns"><button class="btn-clear" onclick="plan=DAYS.map(()=>MEALS.map(()=>[]));closeGen();render()">クリア</button><button class="btn-generate" onclick="plan=generateWeek(macFreq);closeGen();render()">生成する</button></div></div>`;
};
window.closeGen=function(){const o=document.getElementById('genOverlay');if(o)o.className='overlay'};

window.openPicker=function(d,m){
  let o=document.getElementById('pickerOverlay');
  if(!o){o=document.createElement('div');o.id='pickerOverlay';o.className='overlay';document.body.appendChild(o)}
  o.className='overlay open';
  window._pickerD=d;window._pickerM=m;window._pickerFilter='all';window._pickerQ='';
  renderPicker();
};
window.closePicker=function(){const o=document.getElementById('pickerOverlay');if(o)o.className='overlay'};

function renderPicker(){
  const o=document.getElementById('pickerOverlay');
  const slot=MKEYS[window._pickerM];
  const items=allFlat.filter(i=>window._pickerFilter==='all'||i.src===window._pickerFilter).filter(i=>!window._pickerQ||i.name.toLowerCase().includes(window._pickerQ.toLowerCase())).filter(i=>i.meal==='any'||i.meal.includes(slot)).sort((a,b)=>a.f-b.f);
  const fBtns=[{k:'all',l:'すべて'},{k:'seveneleven',l:'セブン'},{k:'nosh',l:'nosh'},{k:'mcdonalds',l:'マック'}];

  let h=`<div class="picker"><div class="picker-header"><div class="picker-top"><button class="btn-back" onclick="closePicker()">&larr; 戻る</button><input class="picker-search" type="text" placeholder="メニューを検索..." value="${window._pickerQ}" oninput="window._pickerQ=this.value;renderPicker()"></div><div class="picker-filters">`;
  fBtns.forEach(f=>{h+=`<button class="filter-btn${window._pickerFilter===f.k?' active':''}" onclick="window._pickerFilter='${f.k}';renderPicker()">${f.l}</button>`});
  h+=`</div></div><div class="picker-list"><div class="picker-count">脂質順 -- ${items.length}件</div><div class="picker-items glass-solid">`;
  items.forEach(item=>{
    h+=`<button class="picker-item" onclick='addPickerItem(${JSON.stringify({id:item.id,name:item.name,cal:item.cal,p:item.p,f:item.f,c:item.c,fi:item.fi})})'><div class="src-dot" style="background:${item.srcColor}"></div><div class="item-info"><div class="pi-name">${item.name}</div><div class="pi-macros">${item.cal}kcal P${item.p} F${item.f} C${item.c} Fib${item.fi}</div></div><div class="pi-fat ${fatClass(item.f)}">F${item.f}g</div></button>`;
  });
  h+=`</div></div></div>`;
  o.innerHTML=h;
}

window.addPickerItem=function(item){
  plan[window._pickerD][window._pickerM].push(item);
  closePicker();render();
};

render();
</script>
